# docker-compose.yml - for local development and testing only.
#
# For MikroTik deployment: use `make docker-save` to produce the .tar.gz image,
# then upload to the router flash/USB drive and import via /container/add.
#
# Local test (runs ARM64 image via QEMU binfmt on x86):
#   docker compose up
#
# Local test on native ARM64 machine (M1/M2 Mac, etc.):
#   docker compose up  (no QEMU needed)

services:
  dns-proxy:
    build:
      context: .
      dockerfile: docker/Dockerfile
      platforms:
        - linux/arm64
    image: dns-geosite-proxy:latest
    container_name: dns-geosite-proxy

    # Map to 5353 locally to avoid conflict with the host DNS resolver.
    # On MikroTik the container will bind to :53 directly.
    ports:
      - "5353:53/udp"
      - "5353:53/tcp"

    volumes:
      # Mount your config.json (copy from config.example.json and edit)
      - ./config.json:/etc/dns-proxy/config.json:ro
      # Persistent volume for dlc.dat (survives container recreates)
      - dlc-data:/data

    environment:
      # Override config path if needed
      - DNS_PROXY_CONFIG=/etc/dns-proxy/config.json
      # Set your timezone for correct cron execution times
      - TZ=Europe/Moscow

    restart: unless-stopped

    # Run as non-root for security (UID/GID 1000)
    # Note: binding :53 requires CAP_NET_BIND_SERVICE on Linux
    cap_add:
      - NET_BIND_SERVICE

    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

    healthcheck:
      test: ["CMD", "nslookup", "-type=A", "cloudflare.com", "127.0.0.1"]
      interval: 30s
      timeout: 5s
      start_period: 15s
      retries: 3

volumes:
  dlc-data:
    driver: local
